name: Kynema-FMB Installation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  Correctness-Linux:
    runs-on: ubuntu-latest
    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 4
      CTEST_PARALLEL_LEVEL: 2
      CXX: g++
      CC: gcc
    steps:
      - name: Install Kynema-FMB
        run: |
          git clone https://github.com/spack/spack.git
          source spack/share/spack/setup-env.sh
          spack compiler find
          spack env create -d .
          spack env activate .
          spack add kynema-fmb ^netcdf-c~mpi ^hdf5~mpi ^kokkos-kernels@4.7.02
          spack develop kynema-fmb@main
          spack concretize -f
          cd kynema-fmb
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git remote add pr-source ${{ github.event.pull_request.head.repo.clone_url }}
            git fetch pr-source ${{ github.head_ref }}
            git checkout -B ${{ github.head_ref }} --track pr-source/${{ github.head_ref }}
          else
            git checkout ${{ github.ref_name }}
          fi
          spack install
      - name: Rigid Body and Springs Test
        run: |
          source spack/share/spack/setup-env.sh
          spack env activate .
          cd kynema-fmb/tests/documentation_tests/floating_platform
          mkdir build
          cd build
          spack build-env kynema-fmb -- bash
          cmake ../ -DCMAKE_BUILD_TYPE=Debug
          make -j 2
          ./floating_platform
      - name: IEA15MW Turbine Test
        run: |
          source spack/share/spack/setup-env.sh
          spack env activate .
          cd kynema-fmb/tests/documentation_tests/iea15mw_turbine
          mkdir build
          cd build
          spack build-env kynema-fmb -- bash
          cmake ../ -DCMAKE_BUILD_TYPE=Debug
          make -j 2
          cp ../IEA-15-240-RWT.yaml ./
          ./iea15mw_turbine
      - name: Heavy Top
        run: |
          source spack/share/spack/setup-env.sh
          spack env activate .
          cd kynema-fmb/tests/documentation_tests/heavy_top
          mkdir build
          cd build
          spack build-env kynema-fmb -- bash
          cmake ../ -DCMAKE_BUILD_TYPE=Debug
          make -j 2
          ./heavy_top
      - name: Spring Mass System
        run: |
          source spack/share/spack/setup-env.sh
          spack env activate .
          cd kynema-fmb/tests/documentation_tests/spring_mass_system
          mkdir build
          cd build
          spack build-env kynema-fmb -- bash
          cmake ../ -DCMAKE_BUILD_TYPE=Debug
          make -j 2
          ./spring_mass_system
      - name: Three Blade Rotor
        run: |
          source spack/share/spack/setup-env.sh
          spack env activate .
          cd kynema-fmb/tests/documentation_tests/three_blade_rotor
          mkdir build
          cd build
          spack build-env kynema-fmb -- bash
          cmake ../ -DCMAKE_BUILD_TYPE=Debug
          make -j 2
          ./three_blade_rotor
